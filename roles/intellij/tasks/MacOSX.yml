---
- name: "IntelliJ | MacOSX | Validate IntelliJ edition"
  ansible.builtin.assert:
    that:
    - intellij_edition in ['community', 'ultimate']
    - intellij_version == 'latest' or intellij_version is match('^[0-9]{4}\\.[0-9]+(\\.(x|[0-9]+(\\.[0-9]+)?))?$')
    fail_msg: "intellij_edition must be 'community' or 'ultimate'"

- name: "IntelliJ | MacOSX | Validate supported version mode"
  ansible.builtin.assert:
    that:
    - intellij_version == 'latest'
    fail_msg: "Pinned intellij_version is currently supported on Linux only. Use intellij_version: latest on macOS."

- name: "IntelliJ | MacOSX | Install IntelliJ IDEA"
  community.general.homebrew_cask:
    name: "{{ 'intellij-idea-ce' if intellij_edition == 'community' else 'intellij-idea' }}"
    state: present
