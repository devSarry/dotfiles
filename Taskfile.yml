version: 3

vars:
  container_runtime:
    sh: command -v docker >/dev/null 2>&1 && echo docker || echo podman
  image_name: devbox:latest
  workspace_dir:
    sh: pwd

tasks:
  docker-build:
    desc: Build dotfiles Docker image
    cmds:
    - "{{.container_runtime}} build -t {{.image_name}} ."

  docker-shell:
    desc: Start the dotfiles dev container with the local repo mounted and synced on startup
    cmds:
    - "{{.container_runtime}} run --rm -it -v {{.workspace_dir}}:/workspaces/dotfiles:Z {{.image_name}}"

  docker-syntax:
    desc: Run ansible syntax validation inside the dev container
    cmds:
    - "{{.container_runtime}} run --rm -t -v {{.workspace_dir}}:/workspaces/dotfiles:Z {{.image_name}} bash -lc 'ansible-playbook main.yml --syntax-check'"

  docker-role-check:
    desc: "Run a role in Ansible check mode inside the dev container (usage: task docker-role-check ROLE=git)"
    requires:
      vars: [ ROLE ]
    cmds:
    - "{{.container_runtime}} run --rm -t -v {{.workspace_dir}}:/workspaces/dotfiles:Z {{.image_name}} bash -lc 'ansible-playbook main.yml -t {{.ROLE}} --check'"

  docker-role-run:
    desc: "Run a role inside the dev container (usage: task docker-role-run ROLE=git)"
    requires:
      vars: [ ROLE ]
    cmds:
    - "{{.container_runtime}} run --rm -t -v {{.workspace_dir}}:/workspaces/dotfiles:Z {{.image_name}} bash -lc 'ansible-playbook main.yml -t {{.ROLE}}'"
